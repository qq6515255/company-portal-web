name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      invalidate_all:
        description: Refresh the full CDN directory after deploy
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        env:
          NUXT_APP_CDN_URL: ${{ secrets.NUXT_APP_CDN_URL }}
          NUXT_PUBLIC_AMAP_API_KEY: ${{ secrets.NUXT_PUBLIC_AMAP_API_KEY }}
          NUXT_PUBLIC_AMAP_SECURITY_JS_CODE: ${{ secrets.NUXT_PUBLIC_AMAP_SECURITY_JS_CODE }}
        run: npm run generate

      - name: Pre-compress static assets
        run: |
          find .output/public -type f \( \
            -name "*.js" -o -name "*.css" -o -name "*.html" -o \
            -name "*.json" -o -name "*.xml" -o -name "*.svg" -o \
            -name "*.txt" \
          \) -exec gzip -kf9 {} \;

          if command -v brotli >/dev/null 2>&1; then
            find .output/public -type f \( \
              -name "*.js" -o -name "*.css" -o -name "*.html" -o \
              -name "*.json" -o -name "*.xml" -o -name "*.svg" -o \
              -name "*.txt" \
            \) -exec brotli -kfZ {} \;
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: .output/public
          if-no-files-found: error
          retention-days: 3

  deploy-oss:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-output
          path: .output/public

      - name: Install Aliyun CLI
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o aliyun.tgz
          tar -xzf aliyun.tgz
          sudo mv aliyun /usr/local/bin/aliyun
          aliyun version

      - name: Install ossutil
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL https://gosspublic.alicdn.com/ossutil/v2/2.2.2/ossutil-2.2.2-linux-amd64.zip -o ossutil.zip
          unzip -q ossutil.zip
          mv ossutil-2.2.2-linux-amd64/ossutil ./ossutil
          chmod +x ./ossutil

      - name: Configure Aliyun credentials
        env:
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
        run: |
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" \
            --access-key-secret "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" \
            --region "${ALIYUN_REGION:-cn-hangzhou}"

      - name: Sync static files to OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          ENDPOINT="${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}"
          REGION="${ALIYUN_REGION:-}"

          if [ -z "${REGION}" ]; then
            REGION="$(printf '%s' "${ENDPOINT}" | sed -E 's#^https?://##; s#^oss-##; s#\\..*$##')"
          fi

          cat > ~/.ossutilconfig <<CFGEOF
          [Credentials]
          provider = AK
          accessKeyID = ${ALIYUN_ACCESS_KEY_ID}
          accessKeySecret = ${ALIYUN_ACCESS_KEY_SECRET}
          region = ${REGION}
          endpoint = ${ENDPOINT}
          CFGEOF

          ./ossutil sync .output/public/ "oss://${OSS_BUCKET}/" \
            --delete \
            -f \
            --acl public-read \
            --cache-control "no-cache"

          if [ -d .output/public/_nuxt ]; then
            ./ossutil sync .output/public/_nuxt/ "oss://${OSS_BUCKET}/_nuxt/" \
              --delete \
              -f \
              --acl public-read \
              --cache-control "public,max-age=31536000,immutable"
          fi

          if [ -d .output/public/images ]; then
            ./ossutil sync .output/public/images/ "oss://${OSS_BUCKET}/images/" \
              --delete \
              -f \
              --acl public-read \
              --cache-control "public,max-age=2592000"
          fi

      - name: Refresh CDN cache
        env:
          CDN_DOMAIN: ${{ secrets.CDN_DOMAIN }}
          INVALIDATE_ALL: ${{ github.event.inputs.invalidate_all || 'false' }}
        run: |
          if [ -z "${CDN_DOMAIN}" ]; then
            echo "CDN_DOMAIN is empty, skipping CDN refresh"
            exit 0
          fi

          TARGET="https://${CDN_DOMAIN}/"

          aliyun cdn RefreshObjectCaches \
            --ObjectPath "${TARGET}" \
            --ObjectType Directory || true

          if [ "${INVALIDATE_ALL}" = "true" ]; then
            aliyun cdn RefreshObjectCaches \
              --ObjectPath "${TARGET}" \
              --ObjectType Directory || true
          fi

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-output
          path: .output/public

      - name: Prepare ECS auth
        env:
          ECS_SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          ECS_DEPLOY_PASSWORD: ${{ secrets.ECS_DEPLOY_PASSWORD }}
          ECS_PASSWORD: ${{ secrets.ECS_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          deploy_password="${ECS_DEPLOY_PASSWORD:-${ECS_PASSWORD:-}}"

          if [ -n "${ECS_SSH_PRIVATE_KEY}" ]; then
            raw_key="${ECS_SSH_PRIVATE_KEY%\"}"
            raw_key="${raw_key#\"}"
            raw_key="${raw_key%\'}"
            raw_key="${raw_key#\'}"

            if printf '%s' "${raw_key}" | grep -Eq '^/|^[A-Za-z]:\\'; then
              echo "ECS_SSH_PRIVATE_KEY looks like a filesystem path, not a private key." >&2
              echo "Store the full private key content in the GitHub secret, not a local file path." >&2
              raw_key=""
            fi

            if [ -n "${raw_key}" ]; then
              echo "::group::Debug key format"
              echo "Key length: ${#raw_key}"
              echo "First 30 chars: $(printf '%s' "${raw_key}" | head -c 30)"
              echo "Last 30 chars: $(printf '%s' "${raw_key}" | tail -c 30)"
              echo "Contains backslash-n: $(printf '%s' "${raw_key}" | grep -c '\\\\n' || true)"
              echo "Contains real newlines: $(printf '%s' "${raw_key}" | grep -c $'\n' || true)"
              echo "Starts with BEGIN: $(printf '%s' "${raw_key}" | head -c 5)"
              echo "::endgroup::"
            fi

            # Try base64-decoded first
            if [ -n "${raw_key}" ] && printf '%s' "${raw_key}" | base64 --decode > ~/.ssh/id_ed25519 2>/dev/null \
               && ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
              chmod 600 ~/.ssh/id_ed25519
              echo "ECS_AUTH_MODE=key" >> "$GITHUB_ENV"
              exit 0
            fi
            rm -f ~/.ssh/id_ed25519

            # Try literal newlines with sed
            if [ -n "${raw_key}" ]; then
              printf '%s' "${raw_key}" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_ed25519
              chmod 600 ~/.ssh/id_ed25519
            fi

            if [ -f ~/.ssh/id_ed25519 ] && ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
              echo "ECS_AUTH_MODE=key" >> "$GITHUB_ENV"
              exit 0
            fi

            if [ -f ~/.ssh/id_ed25519 ]; then
              echo "::group::ssh-keygen error details"
              ssh-keygen -y -f ~/.ssh/id_ed25519 2>&1 || true
              echo "First line: $(head -1 ~/.ssh/id_ed25519)"
              echo "Last line: $(tail -1 ~/.ssh/id_ed25519)"
              echo "Line count: $(wc -l < ~/.ssh/id_ed25519)"
              echo "::endgroup::"
            fi
            rm -f ~/.ssh/id_ed25519

            echo "ECS_SSH_PRIVATE_KEY is present but could not be parsed by ssh-keygen" >&2
          fi

          if [ -n "${deploy_password}" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
            echo "ECS_DEPLOY_PASSWORD=${deploy_password}" >> "$GITHUB_ENV"
            echo "ECS_AUTH_MODE=password" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Either ECS_SSH_PRIVATE_KEY or ECS_DEPLOY_PASSWORD/ECS_PASSWORD must be configured"
          exit 1

      - name: Package release
        run: tar -C .output/public -czf site-output.tgz .

      - name: Upload release package
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_DEPLOY_USER: ${{ secrets.ECS_DEPLOY_USER }}
          ECS_DEPLOY_PASSWORD: ${{ secrets.ECS_DEPLOY_PASSWORD }}
          ECS_SSH_PORT: ${{ secrets.ECS_SSH_PORT }}
        run: |
          PORT="${ECS_SSH_PORT:-22}"
          if [ "${ECS_AUTH_MODE}" = "password" ]; then
            SSHPASS="${ECS_DEPLOY_PASSWORD}" sshpass -e scp -P "${PORT}" -o StrictHostKeyChecking=no \
              site-output.tgz \
              "${ECS_DEPLOY_USER}@${ECS_HOST}:/tmp/site-output-${GITHUB_SHA}.tgz"
          else
            scp -P "${PORT}" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              site-output.tgz \
              "${ECS_DEPLOY_USER}@${ECS_HOST}:/tmp/site-output-${GITHUB_SHA}.tgz"
          fi

      - name: Activate release on ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_DEPLOY_USER: ${{ secrets.ECS_DEPLOY_USER }}
          ECS_DEPLOY_PASSWORD: ${{ secrets.ECS_DEPLOY_PASSWORD }}
          ECS_SSH_PORT: ${{ secrets.ECS_SSH_PORT }}
          ECS_SITE_ROOT: ${{ secrets.ECS_SITE_ROOT }}
          ECS_NGINX_SERVICE: ${{ secrets.ECS_NGINX_SERVICE }}
        run: |
          PORT="${ECS_SSH_PORT:-22}"
          SITE_ROOT="${ECS_SITE_ROOT:-/var/www/company-portal}"
          NGINX_SERVICE="${ECS_NGINX_SERVICE:-nginx}"

          if [ "${ECS_AUTH_MODE}" = "password" ]; then
            SSHPASS="${ECS_DEPLOY_PASSWORD}" sshpass -e ssh -p "${PORT}" -o StrictHostKeyChecking=no \
              "${ECS_DEPLOY_USER}@${ECS_HOST}" \
              "SITE_ROOT='${SITE_ROOT}' RELEASE_ID='${GITHUB_SHA}' NGINX_SERVICE='${NGINX_SERVICE}' bash -s" <<'REMOTE'
          else
            ssh -p "${PORT}" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "${ECS_DEPLOY_USER}@${ECS_HOST}" \
              "SITE_ROOT='${SITE_ROOT}' RELEASE_ID='${GITHUB_SHA}' NGINX_SERVICE='${NGINX_SERVICE}' bash -s" <<'REMOTE'
          fi
          set -euo pipefail

          release_dir="${SITE_ROOT}/releases/${RELEASE_ID}"
          archive="/tmp/site-output-${RELEASE_ID}.tgz"

          sudo mkdir -p "${SITE_ROOT}/releases"
          sudo rm -rf "${release_dir}"
          sudo mkdir -p "${release_dir}"
          sudo tar -xzf "${archive}" -C "${release_dir}"
          sudo ln -sfn "${release_dir}" "${SITE_ROOT}/current"

          if id www-data >/dev/null 2>&1; then
            sudo chown -R www-data:www-data "${SITE_ROOT}"
          fi

          sudo find "${SITE_ROOT}" -type d -exec chmod 755 {} \;
          sudo find "${SITE_ROOT}" -type f -exec chmod 644 {} \;

          if command -v nginx >/dev/null 2>&1; then
            sudo nginx -t
            sudo systemctl reload "${NGINX_SERVICE}" || sudo nginx -s reload
          fi

          rm -f "${archive}"
          REMOTE
