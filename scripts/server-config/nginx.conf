# ============================================
# 顺泰包装 - Nginx 生产配置
# 放置到 /etc/nginx/sites-enabled/suntai-portal
# ============================================

# 上游（如需反向代理到 Nuxt SSR 时启用）
# upstream nuxt_app {
#     server 127.0.0.1:3000;
# }

server {
    listen 80;
    listen [::]:80;
    server_name suntaizh.cn www.suntaizh.cn;

    # 强制 HTTPS（证书配置好后启用）
    # return 301 https://$server_name$request_uri;

    root /var/www/suntai-portal;
    index index.html;

    # === Gzip 压缩 ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # === Brotli 压缩（需安装 brotli 模块） ===
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml;

    # === 使用预压缩文件（Nginx 直接返回 .gz / .br） ===
    gzip_static on;

    # === 浏览器缓存策略 ===
    # HTML 不缓存（确保内容更新及时生效）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # 带 hash 的 JS/CSS（永久缓存）
    location ~* \.(js|css)\?[a-zA-Z0-9]+$ {
        add_header Cache-Control "public, immutable";
        expires 1y;
        access_log off;
    }

    # 静态资源（图片、字体）
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000";
        expires 30d;
        access_log off;
    }

    # === SPA 路由回退（Nuxt SSG 必需） ===
    location / {
        try_files $uri $uri/ /index.html;
    }

    # === 安全头 ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === 隐藏 Nginx 版本 ===
    server_tokens off;

    # === 日志 ===
    access_log /var/log/nginx/suntai-access.log;
    error_log /var/log/nginx/suntai-error.log;
}

